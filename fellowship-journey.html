<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fellowship Journey — UNbound</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="dashboard.css" />
<style>
  .jrny-back { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 600; color: var(--ink-mid); margin-bottom: 18px; transition: transform .18s, color .18s; }
  .jrny-back:hover { color: var(--accent-dk); transform: translateX(-3px); }
  .jrny-back svg { width: 16px; height: 16px; }

  .jrny-hero { background: linear-gradient(135deg, var(--navy), #074b6b); color: #fff; border-radius: var(--radius); padding: 30px 34px; margin-bottom: 34px; position: relative; overflow: hidden; }
  .jrny-hero::after { content:""; position:absolute; right:-30px; top:-50px; width:240px; height:240px; background: radial-gradient(circle, rgba(0,180,216,0.4), transparent 70%); }
  .jrny-hero .eyebrow { color: var(--accent-light); }
  .jrny-hero h1 { font-family: var(--display); font-weight: 800; font-size: 32px; letter-spacing: -0.02em; margin: 8px 0 8px; }
  .jrny-hero p { font-size: 14.5px; color: rgba(255,255,255,0.72); max-width: 540px; }
  .jrny-hero .pct { position: absolute; right: 34px; top: 30px; font-family: var(--display); font-weight: 800; font-size: 42px; }

  .section-label { font-family: var(--display); font-weight: 700; font-size: 21px; margin: 8px 0 18px; display: flex; align-items: center; gap: 10px; }
  .section-label svg { width: 20px; height: 20px; color: var(--accent); }

  .phase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 44px; }
  .jcard { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform .2s, box-shadow .2s; }
  .jcard:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(0,50,73,0.12); }
  .jcard .thumb { height: 130px; position: relative; display: grid; place-items: center; }
  .jcard .thumb .badge-done { position: absolute; top: 12px; right: 12px; display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; color: #fff; background: rgba(31,157,87,0.95); padding: 4px 9px; border-radius: 99px; }
  .jcard .thumb .badge-done svg { width: 11px; height: 11px; }
  .jcard .thumb .ph-ico { width: 54px; height: 54px; color: rgba(255,255,255,0.92); }
  .jcard .body { padding: 18px 20px 20px; }
  .jcard .ph-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-dk); font-weight: 600; }
  .jcard h3 { font-family: var(--display); font-weight: 700; font-size: 18px; margin: 4px 0 7px; color: var(--ink); }
  .jcard p { font-size: 13px; color: var(--ink-dim); line-height: 1.55; }

  .meet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .mcard { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); display: flex; gap: 16px; padding: 16px; align-items: center; transition: transform .2s, box-shadow .2s; }
  .mcard:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,50,73,0.1); }
  .mcard .mthumb { width: 72px; height: 72px; border-radius: 12px; flex-shrink: 0; display: grid; place-items: center; color: #fff; }
  .mcard .mthumb svg { width: 30px; height: 30px; }
  .mcard h4 { font-size: 15px; font-weight: 700; color: var(--ink); }
  .mcard .mdate { font-family: var(--mono); font-size: 11px; color: var(--accent-dk); font-weight: 600; margin: 3px 0 5px; }
  .mcard .mdesc { font-size: 12.5px; color: var(--ink-dim); line-height: 1.5; }
  .content { max-width: 1120px; }
</style>
</head>
<body>

<div class="main" style="width:100%">
  <header class="topbar">
    <a class="sb-brand" href="fellow-dashboard.html" style="border:none;padding:0;margin:0;color:var(--ink)">
      <img src="logo.png" alt="UNbound" onerror="this.style.display='none'" style="height:40px" />
      <span class="wm" style="color:var(--navy)">UNbound</span>
    </a>
    <div class="spacer"></div>
    <a class="btn btn-ghost" href="fellow-dashboard.html">Back to Dashboard</a>
  </header>

  <div class="content">
    <a class="jrny-back" href="fellow-dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Dashboard
    </a>

    <div class="jrny-hero">
      <div class="pct">42%</div>
      <div class="eyebrow">Your Fellowship Journey</div>
      <h1>How far you've come</h1>
      <p>A look back at the phases you've completed and the meetings that got you here. Two of five phases done — onto the Launch Sequence.</p>
    </div>

    <div class="section-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Completed Phases
    </div>
    <div class="phase-grid" id="phaseGrid"></div>

    <div class="section-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Past Meetings
    </div>
    <div class="meet-grid" id="meetGrid"></div>
  </div>
</div>

<script>
  var PHASES = [
    { tag: 'Phase 01 · Empathize', t: 'Orbit of Ideas', g1: '#003249', g2: '#00B4D8',
      d: 'Kicked off the cohort, formed your team, and ran community empathy interviews to find a real problem worth solving.',
      ico: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>' },
    { tag: 'Phase 02 · Define', t: 'Trajectory Set', g1: '#074b6b', g2: '#90E0EF',
      d: 'Synthesized your research into a sharp problem statement, picked your SDG targets, and aligned the team on a north star.',
      ico: '<polygon points="3 11 22 2 13 21 11 13 3 11"/>' }
  ];
  var MEETINGS = [
    { t: 'Cohort Kickoff', date: 'May 3, 2026', c: '#00B4D8', d: 'Met your cohort, mentors, and walked through the Fellowship roadmap.',
      ico: '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>' },
    { t: 'Empathy Workshop', date: 'May 10, 2026', c: '#7c5cff', d: 'Learned interview techniques and practiced active listening as a team.',
      ico: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' },
    { t: 'Define Sprint', date: 'May 24, 2026', c: '#1f9d57', d: 'Workshop to converge on a single problem statement and success metrics.',
      ico: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' },
    { t: 'Mentor 1:1 — Round 1', date: 'May 28, 2026', c: '#e0772b', d: 'First check-in with mentor Diego N. to pressure-test your direction.',
      ico: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' }
  ];
  document.getElementById('phaseGrid').innerHTML = PHASES.map(function (p) {
    return '<div class="jcard"><div class="thumb" style="background:linear-gradient(135deg,' + p.g1 + ',' + p.g2 + ')">' +
      '<span class="badge-done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Completed</span>' +
      '<svg class="ph-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + p.ico + '</svg></div>' +
      '<div class="body"><div class="ph-tag">' + p.tag + '</div><h3>' + p.t + '</h3><p>' + p.d + '</p></div></div>';
  }).join('');
  document.getElementById('meetGrid').innerHTML = MEETINGS.map(function (m) {
    return '<div class="mcard"><div class="mthumb" style="background:' + m.c + '"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + m.ico + '</svg></div>' +
      '<div><h4>' + m.t + '</h4><div class="mdate">' + m.date + '</div><div class="mdesc">' + m.d + '</div></div></div>';
  }).join('');
</script>
</body>
</html>
